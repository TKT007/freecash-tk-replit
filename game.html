<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#060e1f;font-family:'Nunito',sans-serif}
#app{
  width:100vw;height:100vh;height:100dvh;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse 80% 55% at 20% 0%,#1a4a9a,transparent 55%),radial-gradient(ellipse 60% 40% at 80% 100%,#0a2060,transparent 60%),#060e1f;
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
/* STARS */
#stars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:rgba(255,255,255,0.9);animation:twinkle var(--d,2s) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}
/* HEADER */
#header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(8px,2.5vw,14px) clamp(12px,4vw,20px) 2px;
  flex-shrink:0;
}
.score-badge{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(20,40,10,0.9),rgba(30,60,15,0.9));
  border:1.5px solid #8aaa20;border-radius:24px;padding:5px 14px 5px 10px;
  box-shadow:0 2px 12px rgba(0,0,0,0.5);
}
.crown-icon{font-size:16px;filter:drop-shadow(0 0 4px #FFD700)}
.score-num{font-family:'Fredoka One',cursive;font-size:17px;color:#FFD700;letter-spacing:1px}
.progress-wrap{flex:1;margin:0 10px;position:relative}
.progress-bar{
  height:20px;background:linear-gradient(180deg,#1a0a00,#2a1400);
  border-radius:10px;border:1.5px solid #8a6000;overflow:hidden;
  box-shadow:inset 0 2px 6px rgba(0,0,0,0.6);
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,#cc7700,#FFB800,#FFE566,#FFB800,#cc7700);
  background-size:200% 100%;border-radius:10px;
  animation:shimmer 1.5s linear infinite;transition:width 0.6s ease;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.progress-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#6a3a00;
}
.gear-btn{
  width:38px;height:38px;background:linear-gradient(135deg,#1a2a4a,#0d1a35);
  border-radius:50%;border:1.5px solid #3a5a8a;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;cursor:pointer;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.new-badge{
  position:absolute;top:-5px;right:-5px;
  background:linear-gradient(135deg,#ff4400,#ff6600);
  font-size:8px;font-weight:900;color:#fff;border-radius:4px;padding:2px 5px;
}
/* SCORE */
.score-center{position:relative;z-index:10;text-align:center;flex-shrink:0;padding:0 0 2px}
.score-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:120px;height:60px;
  background:radial-gradient(ellipse,rgba(100,0,255,0.2),transparent 70%);
  pointer-events:none;
}
.big-score{
  font-family:'Fredoka One',cursive;
  font-size:clamp(40px,10vw,54px);
  color:#fff;
  text-shadow:0 0 30px rgba(200,150,255,0.35),0 2px 0 rgba(0,0,80,0.6);
  letter-spacing:2px;position:relative;z-index:1;line-height:1;
}
/* BOARD */
#board-wrap{
  position:relative;z-index:10;
  margin:0 clamp(8px,2.5vw,14px);
  background:linear-gradient(180deg,rgba(8,22,55,0.95),rgba(5,15,40,0.95));
  border-radius:16px;
  border:2px solid rgba(80,130,220,0.25);
  padding:clamp(5px,1.5vw,9px);
  box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 0 40px rgba(0,0,40,0.4);
  flex-shrink:0;
}
#board{display:grid;grid-template-columns:repeat(8,1fr);gap:clamp(2px,0.5vw,3px);width:100%;aspect-ratio:1}
.cell{
  border-radius:5px;
  background:linear-gradient(160deg,#0d2550,#081830);
  border:1px solid #1a3a65;
  aspect-ratio:1;position:relative;overflow:hidden;cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),inset 0 -1px 0 rgba(0,0,0,0.3);
}
.gem{width:100%;height:100%;border-radius:5px;position:relative;overflow:hidden}
.gem::after{content:'';position:absolute;inset:0;border-radius:5px;border:1.5px solid rgba(255,200,50,0.5);pointer-events:none}
.gem::before{content:'';position:absolute;top:8%;left:12%;width:38%;height:26%;background:rgba(255,255,255,0.65);border-radius:50%;transform:rotate(-25deg);pointer-events:none}
.gem-red{background:radial-gradient(circle at 35% 25%,#ff9999,#ff2222 40%,#990000);box-shadow:inset 0 2px 4px rgba(255,150,150,0.3),0 2px 6px rgba(200,0,0,0.4)}
.gem-yellow{background:radial-gradient(circle at 35% 25%,#ffe066,#FFB800 40%,#886600);box-shadow:inset 0 2px 4px rgba(255,240,150,0.3),0 2px 6px rgba(180,130,0,0.4)}
.gem-green{background:radial-gradient(circle at 35% 25%,#99ff99,#22cc22 40%,#115500);box-shadow:inset 0 2px 4px rgba(150,255,150,0.3),0 2px 6px rgba(0,150,0,0.4)}
.gem-blue{background:radial-gradient(circle at 35% 25%,#99ccff,#2266ee 40%,#0a2288);box-shadow:inset 0 2px 4px rgba(150,180,255,0.3),0 2px 6px rgba(0,50,200,0.4)}
.gem-purple{background:radial-gradient(circle at 35% 25%,#dd99ff,#9922dd 40%,#440088);box-shadow:inset 0 2px 4px rgba(200,150,255,0.3),0 2px 6px rgba(100,0,200,0.4)}
/* TRAY */
#tray{
  display:flex;justify-content:space-around;align-items:center;
  margin:clamp(5px,1.5vw,9px) clamp(8px,2.5vw,14px) 0;
  padding:clamp(8px,2.5vw,14px) 8px;
  background:linear-gradient(180deg,rgba(5,12,35,0.92),rgba(3,8,25,0.92));
  border-radius:14px;border:1.5px solid rgba(80,130,220,0.2);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  flex-shrink:0;min-height:80px;
}
.piece-slot{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;flex:1;padding:5px;border-radius:12px;transition:all 0.15s;
  min-height:65px;position:relative;
}
.piece-slot.selected{background:rgba(255,215,0,0.1);box-shadow:0 0 0 2px rgba(255,215,0,0.5),0 0 20px rgba(255,215,0,0.2)}
.piece-slot.used{opacity:0.15;pointer-events:none}
.sparkle-hint{
  position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;background:#FFD700;border-radius:50%;
  animation:dot-pulse 1s ease-in-out infinite;opacity:0;
}
.piece-slot:not(.used):not(.selected) .sparkle-hint{opacity:1}
@keyframes dot-pulse{0%,100%{transform:translateX(-50%) scale(1);opacity:0.5}50%{transform:translateX(-50%) scale(1.5);opacity:1}}
.mini-grid{display:grid;gap:3px}
.mini-cell{width:20px;height:20px;border-radius:4px}
.mini-empty{background:transparent}
.mini-gem{position:relative;overflow:hidden}
.mini-gem::before{content:'';position:absolute;top:10%;left:15%;width:35%;height:28%;background:rgba(255,255,255,0.55);border-radius:50%;transform:rotate(-25deg)}
.mini-gem::after{content:'';position:absolute;inset:0;border:1px solid rgba(255,200,50,0.5);border-radius:4px}
/* ANIMATIONS */
@keyframes clear-flash{0%{filter:brightness(3) saturate(0)}30%{filter:brightness(2) saturate(2)}100%{filter:brightness(1) saturate(1);opacity:0}}
.clearing{animation:clear-flash 0.35s ease forwards}
@keyframes place-pop{0%{transform:scale(0.5);opacity:0.5}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.cell.just-placed .gem{animation:place-pop 0.2s ease}
/* AWESOME */
#awesome{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0) rotate(-8deg);
  z-index:500;pointer-events:none;
  font-family:'Fredoka One',cursive;font-size:clamp(44px,12vw,60px);
  color:#FFD700;
  text-shadow:0 0 40px rgba(255,215,0,0.9),0 0 80px rgba(255,150,0,0.5),0 4px 0 rgba(100,50,0,0.8),-2px -2px 0 #8B4500,2px 2px 0 #8B4500;
  white-space:nowrap;opacity:0;
  transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1),opacity 0.2s;
}
#awesome.show{transform:translate(-50%,-50%) scale(1) rotate(-3deg);opacity:1}
#awesome.hide{transform:translate(-50%,-50%) scale(1.3) rotate(2deg);opacity:0;transition:transform 0.3s ease,opacity 0.3s ease}
/* SPARKLES */
.sparkle{position:absolute;pointer-events:none;z-index:400;animation:sparkle-fly var(--dur,0.7s) ease forwards;font-size:var(--sz,20px)}
@keyframes sparkle-fly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2) rotate(var(--rot,180deg))}}
/* OVERLAY */
.overlay{
  position:absolute;inset:0;z-index:600;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,20,0.75);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity 0.4s ease;
}
.overlay.visible{opacity:1;pointer-events:all}
/* THANKS */
#thanks-popup{
  width:min(310px,85vw);
  background:linear-gradient(160deg,#0d2a60,#081840 50%,#040e28);
  border-radius:24px;border:2px solid rgba(100,160,255,0.4);
  padding:28px 24px 32px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 0 0 1px rgba(100,160,255,0.1),0 30px 80px rgba(0,0,0,0.8),inset 0 1px 0 rgba(150,200,255,0.2);
  transform:scale(0.4) translateY(40px);transition:transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
#thanks-overlay.visible #thanks-popup{transform:scale(1) translateY(0)}
.popup-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.popup-star{position:absolute;background:#fff;border-radius:50%;animation:pop-star var(--d,2s) ease-in-out infinite alternate}
@keyframes pop-star{0%{opacity:0.1}100%{opacity:0.7}}
.thanks-title{font-family:'Fredoka One',cursive;font-size:26px;color:#fff;margin-bottom:6px;letter-spacing:0.5px}
.thanks-sub{font-size:16px;color:#88aaff;margin-bottom:4px;font-weight:800}
.thanks-amount{
  font-family:'Fredoka One',cursive;font-size:clamp(52px,14vw,64px);color:#FFD700;
  text-shadow:0 0 30px rgba(255,215,0,0.7),0 3px 0 rgba(100,60,0,0.8);
  letter-spacing:1px;margin:8px 0 0;line-height:1;
}
.coin-rain{position:absolute;inset:0;pointer-events:none;border-radius:24px;overflow:hidden}
.coin-particle{position:absolute;animation:coin-fall var(--d,0.9s) var(--delay,0s) ease-in forwards;font-size:var(--sz,22px)}
@keyframes coin-fall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}80%{opacity:0.8}100%{transform:translateY(320px) rotate(var(--rot,360deg)) scale(0.5);opacity:0}}

/* ═══════════════════════════════════════════════
   FREECASH POPUP — pixel perfect match to screenshot
   ═══════════════════════════════════════════════ */
#fc-overlay{z-index:700}
#fc-popup{
  width:min(340px,90vw);
  background:#111a12;
  border-radius:26px;
  border:2px solid rgba(0,255,68,0.25);
  overflow:hidden;position:relative;
  transform:scale(0.3) translateY(80px);opacity:0;
  transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s ease;
  box-shadow:
    0 0 0 1px rgba(0,255,68,0.08),
    0 0 40px rgba(0,255,68,0.18),
    0 0 80px rgba(0,200,50,0.10),
    0 30px 80px rgba(0,0,0,0.9);
  animation:none;
}
#fc-overlay.visible #fc-popup{transform:scale(1) translateY(0);opacity:1}

/* Outer glow ring — matches the screenshot green halo */
#fc-popup::before{
  content:'';
  position:absolute;inset:-3px;border-radius:28px;
  background:transparent;
  box-shadow:0 0 30px rgba(0,255,68,0.35),0 0 60px rgba(0,220,60,0.15);
  pointer-events:none;z-index:0;
  animation:fc-halo 2.5s ease-in-out infinite;
}
@keyframes fc-halo{
  0%,100%{box-shadow:0 0 25px rgba(0,255,68,0.3),0 0 50px rgba(0,220,60,0.12)}
  50%{box-shadow:0 0 45px rgba(0,255,68,0.55),0 0 80px rgba(0,220,60,0.25)}
}

.fc-content{padding:26px 24px 24px;position:relative;z-index:2;text-align:center}

/* Logo row — real image + text fallback */
.fc-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.fc-logo-img{height:44px;width:auto;display:block}
.fc-logo-fallback{
  display:none;align-items:center;gap:10px;
}
.fc-logo-icon-box{
  width:40px;height:40px;
  background:linear-gradient(145deg,#00ee44,#00aa33);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,200,60,0.5);
  flex-shrink:0;
}
.fc-logo-icon-inner{
  position:relative;width:26px;height:26px;
}
.fc-logo-icon-inner::before{
  content:'';position:absolute;inset:0;
  border:2.5px solid #001a08;border-radius:50%;
}
.fc-logo-icon-inner::after{
  content:'FC';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;color:#001a08;
  font-family:Arial Black,sans-serif;
  display:flex;align-items:center;justify-content:center;
}
.fc-wordmark{font-family:'Fredoka One',cursive;font-size:22px;color:#fff;line-height:1;letter-spacing:0.5px}
.fc-wordmark span{display:block;color:#00ff66}

.fc-milestone{
  font-size:11px;font-weight:900;letter-spacing:3px;color:#00cc44;
  margin:0 0 16px;text-transform:uppercase;
}

/* Trophy circle */
.fc-trophy-circle{
  width:72px;height:72px;
  background:radial-gradient(circle,#0d2e0f,#081a0a);
  border:2px solid rgba(0,255,68,0.2);
  border-radius:50%;
  margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  box-shadow:0 0 0 4px rgba(0,255,68,0.06),0 0 20px rgba(0,255,68,0.2);
  animation:trophy-beat 2.5s ease-in-out infinite;
}
@keyframes trophy-beat{
  0%,100%{box-shadow:0 0 0 4px rgba(0,255,68,0.06),0 0 20px rgba(0,255,68,0.2)}
  50%{box-shadow:0 0 0 6px rgba(0,255,68,0.12),0 0 35px rgba(0,255,68,0.35)}
}

.fc-level{
  font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:#fff;
  margin-bottom:10px;letter-spacing:0.3px;
}

/* Big money amount */
.fc-money{
  font-family:'Fredoka One',cursive;
  font-size:clamp(60px,16vw,72px);
  color:#00ff66;line-height:1;
  text-shadow:0 0 50px rgba(0,255,100,0.65),0 4px 0 rgba(0,60,20,0.9);
  letter-spacing:-2px;
  margin-bottom:6px;
}

.fc-subtitle{font-size:13px;color:#555;margin-bottom:18px;line-height:1.4}
.fc-subtitle span{color:#00cc44;font-weight:800}

/* Balance row */
.fc-bal-box{
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(0,255,68,0.1);
  border-radius:14px;
  padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;

.fc-bal-label{font-size:15px;color:#444;font-weight:700}
.fc-bal-amount{font-family:'Fredoka One',cursive;font-size:22px;color:#00ff66}

.fc-play-btn{
  width:100%;padding:17px;
  background:linear-gradient(135deg,#00e040,#00bb33);
  border-radius:50px;border:none;
  font-family:'Nunito',sans-serif;font-size:19px;font-weight:900;color:#001a08;

.pwa-close{background:transparent;border:none;color:#88aacc;font-size:22px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}

<script>
// STARS
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<55;i++){
    const d=document.createElement('div');d.className='star';
    const sz=Math.random()*2.5+0.5;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
    s.appendChild(d);
  }
})();

const COLS=8,ROWS=8;
let board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let score=16372,selectedPiece=null,pieces=[],gamePhase='playing';

function initBoard(){
  [[0,0,'red'],[0,1,'red'],[0,2,'red'],[0,5,'yellow'],
   [1,0,'red'],[1,3,'yellow'],[1,4,'yellow'],[1,5,'yellow'],[1,6,'yellow'],
   [2,3,'yellow'],[2,4,'yellow'],[2,5,'yellow'],[2,7,'blue'],
   [3,0,'green'],[3,6,'blue'],[3,7,'blue'],
   [4,0,'green'],[4,4,'blue'],[4,5,'blue'],[4,6,'blue'],[4,7,'blue'],
   [5,0,'green'],[5,6,'blue'],[5,7,'blue'],
   [6,3,'green'],[6,4,'green'],[6,5,'red'],[6,6,'red'],
   [7,0,'blue'],[7,1,'blue']
  ].forEach(([r,c,color])=>{board[r][c]=color});
}

function renderBoard(){
  const el=document.getElementById('board');el.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');cell.className='cell';cell.dataset.r=r;cell.dataset.c=c;
    if(board[r][c]){const gem=document.createElement('div');gem.className=`gem gem-${board[r][c]}`;cell.appendChild(gem);}
    cell.addEventListener('click',()=>onCellClick(r,c));el.appendChild(cell);
  }
}

function renderTray(){
  const el=document.getElementById('tray');el.innerHTML='';
  pieces.forEach((piece,idx)=>{
    const slot=document.createElement('div');
    slot.className='piece-slot'+(piece.used?' used':'')+(selectedPiece===idx?' selected':'');
    slot.addEventListener('click',()=>selectPiece(idx));
    if(!piece.used){
      const rows=piece.shape.length,cols=piece.shape[0].length;
      const mg=document.createElement('div');mg.className='mini-grid';
      mg.style.gridTemplateColumns=`repeat(${cols},20px)`;mg.style.gap='3px';
      for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
        const mc=document.createElement('div');
        mc.className=piece.shape[r][c]?`mini-cell mini-gem gem-${piece.color}`:'mini-cell mini-empty';
        mg.appendChild(mc);
      }
      slot.appendChild(mg);
      const dot=document.createElement('div');dot.className='sparkle-hint';slot.appendChild(dot);
    }
    el.appendChild(slot);
  });
}

function selectPiece(idx){
  if(pieces[idx].used)return;
  selectedPiece=selectedPiece===idx?null:idx;renderTray();
}

function canPlace(shape,r,c){
  for(let dr=0;dr<shape.length;dr++)for(let dc=0;dc<shape[0].length;dc++)
    if(shape[dr][dc]){const nr=r+dr,nc=c+dc;if(nr>=ROWS||nc>=COLS||board[nr][nc])return false;}
  return true;
}

function doPlace(shape,r,c,color){
  const cells=[];
  for(let dr=0;dr<shape.length;dr++)for(let dc=0;dc<shape[0].length;dc++)
    if(shape[dr][dc]){board[r+dr][c+dc]=color;cells.push({r:r+dr,c:c+dc});}
  return cells;
}

function checkAndClear(){
  const rowsToClear=[],colsToClear=[];
  for(let r=0;r<ROWS;r++)if(board[r].every(c=>c))rowsToClear.push(r);
  for(let c=0;c<COLS;c++)if(board.every(row=>row[c]))colsToClear.push(c);
  if(rowsToClear.length||colsToClear.length){
    const allCells=document.querySelectorAll('.cell');
    rowsToClear.forEach(r=>{for(let c=0;c<COLS;c++)allCells[r*COLS+c].classList.add('clearing');});
    colsToClear.forEach(c=>{for(let r=0;r<ROWS;r++)allCells[r*COLS+c].classList.add('clearing');});
    setTimeout(()=>{
      rowsToClear.forEach(r=>{board[r]=Array(COLS).fill(null)});
      colsToClear.forEach(c=>{for(let r=0;r<ROWS;r++)board[r][c]=null;});
      score+=(rowsToClear.length+colsToClear.length)*100;
      renderBoard();updateScoreDisplay();
    },360);
  }
}

function spawnSparkles(x,y,count=10){
  const emojis=['✨','⭐','💥','🌟','💫','⚡'];
  for(let i=0;i<count;i++){
    const s=document.createElement('div');s.className='sparkle';
    const angle=(Math.PI*2/count)*i+Math.random()*0.5,dist=30+Math.random()*80,dur=(0.5+Math.random()*0.5).toFixed(2);
    s.style.cssText=`left:${x}px;top:${y}px;--tx:${(Math.cos(angle)*dist).toFixed(0)}px;--ty:${(Math.sin(angle)*dist).toFixed(0)}px;--dur:${dur}s;--sz:${16+Math.floor(Math.random()*12)}px;--rot:${Math.floor(Math.random()*360)}deg;animation-delay:${(Math.random()*0.15).toFixed(2)}s`;
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    document.getElementById('app').appendChild(s);
    setTimeout(()=>s.remove(),(parseFloat(dur)+0.3)*1000);
  }
}

function updateScoreDisplay(){
  document.getElementById('score-display').textContent=score;
  document.getElementById('big-score').textContent=score;
}

function onCellClick(r,c){
  if(gamePhase!=='playing'||selectedPiece===null)return;
  const piece=pieces[selectedPiece];
  if(piece.used)return;
  if(!canPlace(piece.shape,r,c))return;
  const placed=doPlace(piece.shape,r,c,piece.color);
  piece.used=true;score+=placed.length*10;selectedPiece=null;
  renderBoard();
  placed.forEach(({r:pr,c:pc})=>{
    const cells=document.querySelectorAll('.cell');
    if(cells[pr*COLS+pc])cells[pr*COLS+pc].classList.add('just-placed');
  });
  const mid=placed[Math.floor(placed.length/2)];
  const br=document.getElementById('board').getBoundingClientRect();
  const ar=document.getElementById('app').getBoundingClientRect();
  const cw=br.width/COLS;
  spawnSparkles(br.left-ar.left+(mid.c+0.5)*cw,br.top-ar.top+(mid.r+0.5)*cw,8);
  checkAndClear();updateScoreDisplay();renderTray();
  if(pieces.filter(p=>!p.used).length===0)setTimeout(triggerWin,500);
}

function triggerWin(){
  if(gamePhase!=='playing')return;
  gamePhase='awesome';
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-pct').textContent='100%';
  const app=document.getElementById('app'),cx=app.offsetWidth/2,cy=app.offsetHeight/2;
  for(let i=0;i<4;i++)setTimeout(()=>spawnSparkles(cx,cy,14),i*120);
  const aw=document.getElementById('awesome');
  aw.classList.add('show');
  setTimeout(()=>{aw.classList.remove('show');aw.classList.add('hide');setTimeout(()=>{aw.classList.remove('hide');showThanks();},350);},2000);
}

function showThanks(){
  gamePhase='thanks';
  const c=document.getElementById('popup-stars');
  for(let i=0;i<20;i++){const s=document.createElement('div');s.className='popup-star';const sz=Math.random()*2+1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(1.5+Math.random()*2).toFixed(1)}s;animation-delay:${(Math.random()*2).toFixed(1)}s`;c.appendChild(s);}
  const rain=document.getElementById('coin-rain');rain.innerHTML='';
  const items=['💰','🪙','💵','💸','✨'];
  for(let i=0;i<22;i++){const p=document.createElement('div');p.className='coin-particle';const sz=16+Math.floor(Math.random()*14),delay=(Math.random()*2.5).toFixed(2),dur=(0.7+Math.random()*0.8).toFixed(2),rot=(Math.random()>0.5?1:-1)*(180+Math.floor(Math.random()*360));p.style.cssText=`left:${Math.random()*100}%;top:0;--d:${dur}s;--delay:${delay}s;--sz:${sz}px;--rot:${rot}deg`;p.textContent=items[Math.floor(Math.random()*items.length)];rain.appendChild(p);}
  document.getElementById('thanks-overlay').classList.add('visible');
  animateMoney('thanks-amount',538.14,2000,()=>setTimeout(showFreeCash,1200));
}

function showFreeCash(){
  gamePhase='freecash';
  document.getElementById('fc-overlay').classList.add('visible');
  animateMoney('fc-amount',912.64,2200);
  animateMoney('fc-balance',912.64,2400);
}

function animateMoney(id,target,duration,cb){
  const el=document.getElementById(id),start=performance.now();
  function tick(now){
    const raw=Math.min((now-start)/duration,1),t=1-Math.pow(1-raw,3);
    el.textContent='$'+(target*t).toFixed(2);
    if(raw<1)requestAnimationFrame(tick);
    else{el.textContent='$'+target.toFixed(2);if(cb)cb();}
  }
  requestAnimationFrame(tick);
}

document.getElementById('fc-btn').addEventListener('click',()=>{
  document.getElementById('fc-overlay').classList.remove('visible');
  document.getElementById('thanks-overlay').classList.remove('visible');
  setTimeout(()=>{
    gamePhase='playing';board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    score=16372;initBoard();spawnPieces();updateScoreDisplay();renderBoard();renderTray();
    document.getElementById('progress-fill').style.width='100%';
    document.getElementById('progress-pct').textContent='100%';
  },300);
});

function spawnPieces(){
  board[4][4]='blue';board[4][5]='blue';board[4][6]='blue';board[4][7]='blue';
  pieces=[
    {shape:[[1,1],[1,0],[1,0]],color:'blue',used:false},
    {shape:[[0,1],[1,1]],color:'green',used:false},
    {shape:[[1,1,1]],color:'green',used:false},
  ];
}

let autoIdx=0;
const autoMoves=[{pieceIdx:0,r:5,c:1},{pieceIdx:1,r:2,c:0},{pieceIdx:2,r:4,c:1}];
function autoStep(){
  if(autoIdx>=autoMoves.length||gamePhase!=='playing')return;
  const mv=autoMoves[autoIdx];selectPiece(mv.pieceIdx);renderTray();
  setTimeout(()=>{onCellClick(mv.r,mv.c);autoIdx++;if(autoIdx<autoMoves.length)setTimeout(autoStep,1100);},350);
}

// PWA banner
(function(){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
  if(isIOS&&!isStandalone){
    setTimeout(()=>{document.getElementById('pwa-banner').style.transform='translateY(0)';},3500);
  }
})();

initBoard();spawnPieces();updateScoreDisplay();renderBoard();renderTray();
setTimeout(autoStep,1200);
</script>
</body>
</html>
