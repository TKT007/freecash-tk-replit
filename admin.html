<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FreeCash Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #0d0f1a;
    color: #fff;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    background: #0d0f1a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-area img {
    height: 34px;
    width: auto;
    object-fit: contain;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo-text span {
    color: #00d97e;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .balance-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1a1d2e;
    border: 1px solid #2a2d40;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    font-family: 'Poppins', sans-serif;
  }

  .money-emoji {
    font-size: 14px;
  }

  .gem-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #1a1d2e;
    border: 1px solid #2a2d40;
    border-radius: 20px;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
  }

  .gem-pill svg {
    width: 16px;
    height: 16px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #2a2d40;
    flex-shrink: 0;
  }

  /* TABS */
  .tabs {
    display: flex;
    margin: 4px 16px 20px;
    background: #141624;
    border-radius: 14px;
    padding: 4px;
    border: 1px solid #1e2135;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 11px 0;
    font-size: 13px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    color: #6b7280;
    font-family: 'Poppins', sans-serif;
    transition: all 0.2s;
  }

  .tab.active {
    background: #1e2135;
    color: #00d97e;
    font-weight: 600;
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 20px;
    font-weight: 700;
    padding: 0 20px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Poppins', sans-serif;
  }

  .info-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #5b21b6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #c4b5fd;
    cursor: pointer;
    flex-shrink: 0;
    font-family: 'Poppins', sans-serif;
  }

  /* CARDS */
  .card {
    background: #141624;
    border-radius: 16px;
    border: 1px solid #1e2135;
    margin: 0 16px 14px;
    padding: 26px 20px;
    text-align: center;
  }

  .card-label {
    font-size: 13px;
    color: #8b92a5;
    margin-bottom: 10px;
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
  }

  .card-value {
    font-size: 46px;
    font-weight: 700;
    color: #00d97e;
    letter-spacing: -1.5px;
    line-height: 1;
    font-family: 'Poppins', sans-serif;
  }

  /* CASHOUT CARD */
  .cashout-card {
    background: #141624;
    border-radius: 16px;
    border: 1px solid #1e2135;
    margin: 0 16px 14px;
    padding: 24px 20px;
    text-align: center;
  }

  .cashout-label {
    font-size: 13px;
    color: #8b92a5;
    margin-bottom: 8px;
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
  }

  .cashout-value {
    font-size: 44px;
    font-weight: 700;
    color: #00d97e;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
    line-height: 1;
    font-family: 'Poppins', sans-serif;
  }

  .cashout-divider {
    height: 1px;
    background: #1e2135;
    margin-bottom: 16px;
  }

  .cashout-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
    cursor: pointer;
  }

  .cashout-btn-text {
    font-size: 15px;
    font-weight: 600;
    color: #00d97e;
    font-family: 'Poppins', sans-serif;
  }

  .cashout-arrow {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #00d97e;
    font-size: 22px;
    font-weight: 300;
  }

  /* MINI CARDS */
  .mini-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 0 16px 28px;
  }

  .mini-card {
    background: #141624;
    border-radius: 16px;
    border: 1px solid #1e2135;
    padding: 20px 18px;
  }

  .mini-label {
    font-size: 12px;
    color: #8b92a5;
    margin-bottom: 10px;
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
  }

  .mini-value {
    font-size: 24px;
    font-weight: 700;
    color: #00d97e;
    letter-spacing: -0.5px;
    font-family: 'Poppins', sans-serif;
  }

  /* REFER SECTION */
  .refer-section {
    padding: 0 0 20px;
  }

  .green-underline {
    height: 2.5px;
    background: linear-gradient(90deg, #00d97e 60%, transparent 100%);
    margin: 6px 20px 0;
    border-radius: 2px;
    width: 160px;
  }

  /* SCROLL AREA */
  .scroll-area {
    overflow-y: auto;
    padding-bottom: 110px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 430px;
    background: #0d0f1a;
    border-top: 1px solid #1e2135;
    display: flex;
    align-items: center;
    padding: 12px 0 30px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  .nav-icon-wrap {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .nav-item.active .nav-icon-wrap {
    background: #1a2e24;
  }

  .nav-label {
    font-size: 10px;
    font-weight: 500;
    color: #6b7280;
    font-family: 'Poppins', sans-serif;
  }

  .nav-item.active .nav-label { color: #00d97e; }

  .nav-plus-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    flex: 1;
  }

  .nav-plus {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #1e2135;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #9ca3af;
    border: 1px solid #2a2d40;
  }

  .nav-plus-label {
    font-size: 10px;
    font-weight: 500;
    color: #6b7280;
    font-family: 'Poppins', sans-serif;
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo-area">
    <img src="https://i.imgur.com/d4rEH4U.png" alt="FreeCash logo">
    <div class="logo-text"><span>FREE</span>CASH</div>
  </div>
  <div class="nav-right">
    <div class="balance-pill">
      <span class="money-emoji">💵</span>
      <span id="nav-balance">$374.50</span>
    </div>
    <div class="gem-pill">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="12,2 20,8 16,21 8,21 4,8" fill="#60a5fa" opacity="0.85"/>
        <polygon points="12,2 20,8 12,5.5" fill="#bfdbfe"/>
        <polygon points="4,8 12,5.5 8,21" fill="#3b82f6"/>
      </svg>
      <span>1</span>
    </div>
    <div class="avatar">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" fill="#1e1b4b"/>
        <circle cx="18" cy="13" r="6" fill="#6366f1"/>
        <ellipse cx="18" cy="30" rx="11" ry="8" fill="#4338ca"/>
        <circle cx="25" cy="9" r="5" fill="#f59e0b" opacity="0.75"/>
      </svg>
    </div>
  </div>
</nav>

<div class="scroll-area">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">My FreeCash</div>
    <div class="tab">Account Info</div>
  </div>

  <!-- EARNINGS SECTION -->
  <div class="section-title">
    My FreeCash Earnings
    <div class="info-btn">i</div>
  </div>

  <div class="card">
    <div class="card-label">Total Earnings</div>
    <div class="card-value" id="total-earnings">$374.50</div>
  </div>

  <!-- CASHOUT CARD -->
  <div class="cashout-card">
    <div class="cashout-label">Cash Out - Available Balance</div>
    <div class="cashout-value" id="cashout-val">$374.50</div>
    <div class="cashout-divider"></div>
    <div class="cashout-btn">
      <span class="cashout-btn-text">Cash Out</span>
      <div class="cashout-arrow">&#8250;</div>
    </div>
  </div>

  <!-- MINI CARDS -->
  <div class="mini-cards">
    <div class="mini-card">
      <div class="mini-label">Pending</div>
      <div class="mini-value" id="pending-val">$374.50</div>
    </div>
    <div class="mini-card">
      <div class="mini-label">Lifetime</div>
      <div class="mini-value" id="lifetime-val">$374.50</div>
    </div>
  </div>

  <!-- REFER SECTION -->
  <div class="refer-section">
    <div class="section-title">
      Refer a Friend Total
      <div class="info-btn">i</div>
    </div>
    <div class="green-underline"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d97e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <span class="nav-label">Dashboard</span>
  </div>

  <div class="nav-plus-wrap">
    <div class="nav-plus">+</div>
    <span class="nav-plus-label">Ways to Earn</span>
  </div>

  <div class="nav-item">
    <div class="nav-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </div>
    <span class="nav-label">Games</span>
  </div>
</nav>

<script>
  const START = 374.50;
  const END = 912.64;
  const DURATION = 1800;

  function easeOutExpo(t) {
    return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
  }

  function fmt(val) {
    return '$' + val.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / DURATION, 1);
    const eased = easeOutExpo(progress);
    const current = START + (END - START) * eased;
    const display = fmt(current);

    document.getElementById('total-earnings').textContent = display;
    document.getElementById('cashout-val').textContent = display;
    document.getElementById('pending-val').textContent = display;
    document.getElementById('lifetime-val').textContent = display;
    document.getElementById('nav-balance').textContent = display;

    if (progress < 1) requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>

</body>
</html>
